<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="hi.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>HYDR&#923; INFOTECH EMPLOYEE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ═══ DESIGN TOKENS ═══════════════════════════════════════ */
:root{
  --bg:#0d0f14; --surface:#13161e; --surface2:#1a1e2a; --border:#252a38;
  --accent:#A7028C; --accentL:#D916B8; --accent2:#0099ff;
  --warn:#ff6b35; --danger:#ff3860; --text:#e8eaf0;
  --muted:#6b7280; --success:#D916B8; --holiday:#a855f7;
  --topbar-h:56px; --bottomnav-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.mono{font-family:'DM Mono',monospace;}

/* ═══ SCREENS ═══════════════════════════════════════════ */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* ═══ LOGIN ════════════════════════════════════════════ */
#loginScreen{
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#1a0116,#0d0f14 60%),
             radial-gradient(ellipse at 80% 80%,#0a1a2e,transparent 60%);
  padding:20px;
}
.login-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:40px 36px;width:100%;max-width:420px;
  box-shadow:0 40px 80px rgba(0,0,0,.6);position:relative;overflow:hidden;
}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.brand{text-align:center;margin-bottom:32px;}
.brand-logo{max-width:200px;height:auto;display:block;margin:0 auto 14px;border-radius:8px;}
.brand p{color:var();font-size:13px;font-family:'DM Mono',monospace;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var();margin-bottom:8px;}
.field input,.field select{
  width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:16px;/* 16px prevents iOS zoom */
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(167,2,140,.12);}
.field input::placeholder{color:var(--muted);}
.btn{
  width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;transition:all .2s;
  -webkit-appearance:none;touch-action:manipulation;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accentL));color:#fff;}
.btn-primary:active{opacity:.85;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:active{opacity:.8;}
.btn-sm{width:auto;padding:9px 16px;font-size:13px;border-radius:8px;}
.btn-danger{background:var(--danger);color:#fff;border:none;}
.login-error{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none;font-family:'DM Mono',monospace;}
.server-status{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:18px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.s-dot.online{background:var(--accent);}
.s-dot.offline{background:var(--danger);}

/* ═══ EMPLOYEE DASHBOARD ═══════════════════════════════ */
#empScreen{flex-direction:column;background:var(--bg);}

/* Topbar */
.topbar{
  height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;gap:8px;
}
.topbar-logo{height:28px;width:auto;border-radius:4px;}
.topbar-user{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;}
.status-pill{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;}
.pill-in{background:rgba(167,2,140,.15);color:var(--accentL);border:1px solid rgba(167,2,140,.3);}
.pill-out{background:rgba(107,114,128,.15);color:var(--muted);border:1px solid var(--border);}
.pill-late{background:rgba(255,107,53,.15);color:var(--warn);border:1px solid rgba(255,107,53,.3);}
.pill-break{background:rgba(0,153,255,.15);color:var(--accent2);border:1px solid rgba(0,153,255,.3);}

/* Scrollable content area */
.emp-content{
  flex:1;overflow-y:auto;
  padding:16px;
  padding-bottom:calc(var(--bottomnav-h) + 16px); /* space for bottom nav */
  display:flex;flex-direction:column;gap:14px;
}

/* Tab panels */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* Cards */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:20px;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(167,2,140,.4),transparent);}
.card-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

/* Clock */
.clock-display{text-align:center;padding:8px 0;}
.clock-time{
  font-family:'DM Mono',monospace;font-size:42px;font-weight:500;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-2px;line-height:1;
}
.clock-date{color:var(--muted);font-size:11px;margin-top:6px;font-family:'DM Mono',monospace;}
.clock-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.emp-notice{border-radius:10px;padding:10px 14px;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:12px;border:1px solid;}
.emp-notice.default{background:rgba(167,2,140,.06);border-color:rgba(167,2,140,.2);color:var(--accentL);}
.emp-notice.warn{background:rgba(255,107,53,.06);border-color:rgba(255,107,53,.2);color:var(--warn);}
.emp-notice.info{background:rgba(0,153,255,.06);border-color:rgba(0,153,255,.2);color:var(--accent2);}
.emp-notice.success{background:rgba(217,22,184,.06);border-color:rgba(217,22,184,.2);color:var(--accentL);}
.session-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.session-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);}
.session-chip.active{border-color:var(--accent);color:var(--accentL);}

/* Timer ring */
.timer-ring-wrap{display:flex;align-items:center;justify-content:center;margin:4px 0 12px;}
svg.ring{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:7;}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .5s ease;}
.timer-center-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.timer-elapsed{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--text);}
.timer-label{font-size:11px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
.timer-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.stat-box{background:var(--surface2);border-radius:10px;padding:10px 14px;}
.stat-box .s-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.stat-box .s-val{font-family:'DM Mono',monospace;font-size:16px;color:var(--text);margin-top:4px;}

/* Attendance history */
.att-list{max-height:260px;overflow-y:auto;}
.att-row{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;}
.att-row:last-child{border-bottom:none;}
.att-date{font-family:'DM Mono',monospace;color:var(--muted);font-size:11px;white-space:nowrap;}
.att-sessions{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);word-break:break-all;}
.att-badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;}
.badge-present{background:rgba(167,2,140,.1);color:var(--accentL);}
.badge-late{background:rgba(255,107,53,.1);color:var(--warn);}
.badge-holiday{background:rgba(168,85,247,.1);color:var(--holiday);}
.badge-absent{background:rgba(255,56,96,.1);color:var(--danger);}

/* Leave form */
.holiday-form .field{margin-bottom:12px;}
.holiday-form textarea{
  width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:16px;
  resize:vertical;min-height:80px;outline:none;
}
.leave-btn{
  width:100%;padding:13px;border:1px solid rgba(168,85,247,.4);
  background:rgba(168,85,247,.08);color:var(--holiday);
  border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
}
.req-list{display:flex;flex-direction:column;gap:10px;}
.req-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.req-card.approved{border-left:3px solid var(--accent);}
.req-card.rejected{border-left:3px solid var(--danger);}
.req-card.pending{border-left:3px solid var(--holiday);}
.ri-name{font-weight:700;font-size:13px;}
.ri-dates{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;}
.ri-reason{font-size:12px;color:var(--text);margin-top:5px;opacity:.8;}

/* ═══ BOTTOM NAV (mobile nav) ════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bottomnav-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  z-index:200;
  /* safe area for iPhone notch */
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;transition:color .2s;color:var(--muted);
  font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
  border:none;background:none;font-family:'Syne',sans-serif;padding:0;
}
.nav-item.active{color:var(--accentL);}
.nav-item .nav-icon{font-size:20px;line-height:1;}
.nav-item .nav-label{font-size:9px;margin-top:1px;}

/* Toast */
.toast{
  position:fixed;bottom:calc(var(--bottomnav-h) + 12px);left:16px;right:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 18px;font-size:13px;
  z-index:999;display:none;align-items:center;gap:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.show{display:flex;animation:slideUp .25s ease;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(167,2,140,.3);border-radius:2px;}

/* ═══ GB-POPUP-SCALE-BLUR ANIMATION ═══════════════════════ */
@keyframes gb-popup-scale-blur {
  0%   {opacity:0;transform-origin:50% 50%;transform:scale(2,2);filter:blur(90px);}
  100% {opacity:1;transform-origin:50% 50%;transform:scale(1,1);filter:blur(0px);}
}
.visible-section .gb-popup-scale-blur,
.visible-lightbox .gb-popup-scale-blur {
  animation: gb-popup-scale-blur 1s both;
}
.gb-popup-scale-blur {
  animation: gb-popup-scale-blur 1s both;
}

/* ═══ BUTTON ANIMATIONS ════════════════════════════════════ */
@keyframes btn-ripple {
  0%   {box-shadow:0 0 0 0 rgba(167,2,140,.5);}
  70%  {box-shadow:0 0 0 12px rgba(167,2,140,0);}
  100% {box-shadow:0 0 0 0 rgba(167,2,140,0);}
}
@keyframes btn-pulse-glow {
  0%,100% {box-shadow:0 0 8px rgba(167,2,140,.3),0 4px 15px rgba(0,0,0,.3);}
  50%      {box-shadow:0 0 22px rgba(217,22,184,.6),0 4px 20px rgba(167,2,140,.4);}
}
@keyframes btn-bounce-in {
  0%   {transform:scale(1);}
  40%  {transform:scale(.94);}
  70%  {transform:scale(1.04);}
  100% {transform:scale(1);}
}
@keyframes btn-danger-shake {
  0%,100% {transform:translateX(0);}
  20%     {transform:translateX(-3px);}
  40%     {transform:translateX(3px);}
  60%     {transform:translateX(-2px);}
  80%     {transform:translateX(2px);}
}
@keyframes checkin-pulse {
  0%,100% {box-shadow:0 0 0 0 rgba(167,2,140,.45);}
  60%     {box-shadow:0 0 0 10px rgba(167,2,140,0);}
}
@keyframes checkout-slide {
  0%   {background-position:100% 0;}
  100% {background-position:0 0;}
}

.btn-primary {
  background:linear-gradient(135deg,var(--accent),var(--accentL));
  background-size:200% auto;
  transition:all .25s ease,transform .15s ease;
  position:relative;overflow:hidden;
}
.btn-primary::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);
  background-size:200% 100%;background-position:200% 0;
  transition:background-position .5s ease;pointer-events:none;
}
.btn-primary:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(167,2,140,.45);
  animation:btn-pulse-glow 2s ease infinite;
}
.btn-primary:hover::after {background-position:-200% 0;}
.btn-primary:active {
  transform:scale(.97) translateY(0);
  animation:btn-bounce-in .3s ease both;
}
/* Clock In button special pulse */
#checkInBtn:not(:disabled) {animation:checkin-pulse 2.4s ease infinite;}
#checkInBtn:not(:disabled):hover {animation:btn-pulse-glow 1.5s ease infinite;}

.btn-secondary {
  transition:all .25s ease,transform .15s ease;
  position:relative;overflow:hidden;
}
.btn-secondary:hover:not(:disabled) {
  border-color:var(--accent);color:var(--accentL);
  transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.btn-secondary:active:not(:disabled) {transform:scale(.97);}

.btn-danger {transition:all .25s ease,transform .15s ease;}
.btn-danger:hover {
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(255,56,96,.4);filter:brightness(1.1);
}
.btn-danger:active {animation:btn-danger-shake .35s ease both;}

/* Leave submit button */
.leave-btn {
  transition:all .25s ease,transform .15s ease;
  position:relative;overflow:hidden;
}
.leave-btn:hover {
  background:rgba(168,85,247,.18);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(168,85,247,.25);
}
.leave-btn:active {transform:scale(.97);}

/* Bottom nav item animation */
.nav-item {transition:color .2s ease,transform .15s ease;}
.nav-item:active {transform:scale(.88);}
.nav-item.active .nav-icon {
  display:inline-block;
  animation:btn-bounce-in .35s ease both;
}

/* ═══ DESKTOP OVERRIDES (≥ 768px) ═══════════════════════ */
@media(min-width:768px){
  .emp-content{
    padding:28px 32px;
    padding-bottom:28px; /* no bottom nav on desktop */
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    max-width:1100px;margin:0 auto;width:100%;
    /* reset flex */
    flex-direction:unset;
    align-content:start;
  }
  /* On desktop all panels show at once — no tabs */
  .tab-panel{display:block !important;}
  .bottom-nav{display:none;}
  .topbar{padding:0 28px;}
  .topbar-user{text-align:left;flex:none;}
  .status-pill{font-size:11px;padding:6px 12px;}
  .clock-time{font-size:50px;}
  .timer-elapsed{font-size:30px;}
  /* leave requests full-width */
  .full-col{grid-column:1/-1;}
  .toast{left:auto;right:28px;bottom:28px;min-width:280px;max-width:380px;}
  .login-box{padding:48px 52px;}
}
@media(min-width:1024px){
  .clock-time{font-size:52px;}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginScreen" class="screen active visible-section">
  <div class="login-box gb-popup-scale-blur">
    <div class="brand">
      <img src="hi.png" alt="Hydra Infotech" class="brand-logo"/>
      <p class="mono">EMPLOYEE</p>
    </div>
    <div class="server-status">
      <div class="s-dot" id="sDot"></div>
      <span id="sStatus" class="mono">Connecting...</span>
    </div>
    <div class="field">
      <label>Employee ID</label>
      <input type="text" id="loginId" placeholder="Enter your ID" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="loginError">Invalid Employee ID or password.</div>
  </div>
</div>

<!-- ══════════ EMPLOYEE DASHBOARD ══════════ -->
<div id="empScreen" class="screen">

  <!-- Topbar -->
  <div class="topbar">
    <img src="hi.png" alt="Hydra" class="topbar-logo"/>
    <span class="topbar-user mono" id="empNameBar">—</span>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <span class="status-pill pill-out" id="statusPill">● OFF</span>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()" style="display:none;" id="logoutBtn">Out</button>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="emp-content gb-popup-scale-blur" id="empContent">

    <!-- TAB: Home (Clock + Timer) -->
    <div class="tab-panel active" id="tab-home-1">
      <div class="card">
        <div class="card-title">Current Time</div>
        <div class="clock-display">
          <div class="clock-time" id="liveClock">--:--:--</div>
          <div class="clock-date" id="liveDate">---</div>
        </div>
        <div id="empNotice"></div>
        <div class="clock-actions">
          <button class="btn btn-primary" id="checkInBtn" onclick="checkIn()">✓ Clock In</button>
          <button class="btn btn-secondary" id="checkOutBtn" onclick="checkOut()" disabled>◼ Clock Out</button>
        </div>
        <div class="session-row" id="sessionChips"></div>
        <div id="adminCallNotice" style="margin-top:8px;"></div>
      </div>
    </div>

    <div class="tab-panel active" id="tab-home-2">
      <div class="card">
        <div class="card-title">Work Timer — Today's Progress</div>
        <div class="timer-ring-wrap">
          <div style="position:relative;width:150px;height:150px;">
            <svg class="ring" width="150" height="150" viewBox="0 0 150 150">
              <circle class="ring-bg" cx="75" cy="75" r="64"/>
              <circle class="ring-fg" id="timerRing" cx="75" cy="75" r="64" stroke-dasharray="402" stroke-dashoffset="402"/>
            </svg>
            <div class="timer-center-text">
              <div class="timer-elapsed" id="timerElapsed">00:00:00</div>
              <div class="timer-label" id="timerPct">0%</div>
            </div>
          </div>
        </div>
        <div class="timer-stats">
          <div class="stat-box"><div class="s-label">Session</div><div class="s-val" id="sessionLabel">1 of 2</div></div>
          <div class="stat-box"><div class="s-label">Remaining</div><div class="s-val" id="remainingTime">--:--</div></div>
          <div class="stat-box"><div class="s-label">Target</div><div class="s-val" id="targetHours">9h</div></div>
          <div class="stat-box"><div class="s-label">Total</div><div class="s-val" id="totalToday">0h 00m</div></div>
        </div>
      </div>
    </div>

    <!-- TAB: History -->
    <div class="tab-panel" id="tab-history" style="grid-column:1/-1;">
      <div class="card">
        <div class="card-title">My Attendance History</div>
        <div class="att-list" id="attHistory"><p style="color:var(--muted);font-size:13px;">Loading...</p></div>
      </div>
    </div>

<!-- Leave panels removed -->

  </div><!-- /emp-content -->

  <!-- ══ BOTTOM NAV (mobile only) ══ -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📋</span>
      <span class="nav-label">History</span>
    </button>
<!-- Leave tab removed -->
    <button class="nav-item" id="nav-logout" onclick="doLogout()">
      <span class="nav-icon">🚪</span>
      <span class="nav-label">Logout</span>
    </button>
  </nav>

</div><!-- /empScreen -->

<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg">—</span></div>

<script>
const SERVER = window.location.origin;

async function api(method,path,data){
  try{
    const r=await fetch(SERVER+path,{method,headers:{'Content-Type':'application/json'},body:data?JSON.stringify(data):undefined});
    return await r.json();
  }catch(e){return{error:e.message};}
}

// ── State ──────────────────────────────────────────────────
// ── 12-hour time helper ──────────────────────────────────────
function to12hr(t){
  if(!t||t==='—'||t==='…'||t==='--')return t||'—';
  const [hStr,mStr]=t.split(':');
  let h=parseInt(hStr),m=mStr||'00';
  if(isNaN(h))return t;
  const ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return `${h}:${m} ${ampm}`;
}

let session={},settings={workHours:9,startTime:'08:00',endTime:'17:00',graceMins:15,session2Start:'13:30'};
let timerInterval=null,clockInterval=null,checkInTs=null;
let sessionCount=0,totalWorkedSecs=0;
const CIRC=402;

// ── Tab switching (mobile) ──────────────────────────────────
function switchTab(tab){
  const homeIds=['tab-home-1','tab-home-2'];
  const histIds=['tab-history'];
  const allPanels=[...homeIds,...histIds];
  const show = tab==='home'?homeIds:histIds;
  allPanels.forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('active',show.includes(id));
  });
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navBtn=document.getElementById('nav-'+tab);
  if(navBtn) navBtn.classList.add('active');
}

// ── Server check ────────────────────────────────────────────
async function checkServer(){
  const s=await api('GET','/api/settings');
  const dot=document.getElementById('sDot'),st=document.getElementById('sStatus');
  if(s&&!s.error){settings=s;dot.className='s-dot online';st.textContent='Server online ✓';}
  else{dot.className='s-dot offline';st.textContent='Server offline';}
}
checkServer();

// ── Login / Logout ──────────────────────────────────────────
async function doLogin(){
  const empId=document.getElementById('loginId').value.trim();
  const password=document.getElementById('loginPass').value.trim();
  const err=document.getElementById('loginError');err.style.display='none';
  if(!empId||!password){err.textContent='Enter your ID and password.';err.style.display='block';return;}
  const res=await api('POST','/api/auth/employee',{empId,password});
  if(res.ok){
    session={empId:res.emp.id,name:res.emp.name,dept:res.emp.dept};
    showScreen('empScreen');initDashboard();
  }else{err.textContent=res.error||'Invalid credentials.';err.style.display='block';}
}
function doLogout(){
  clearInterval(timerInterval);clearInterval(clockInterval);
  session={};checkInTs=null;sessionCount=0;totalWorkedSecs=0;
  showScreen('loginScreen');
  document.getElementById('loginId').value='';document.getElementById('loginPass').value='';
  checkServer();
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active','visible-section');
  });
  const el=document.getElementById(id);
  el.classList.add('active');
  requestAnimationFrame(()=>{
    el.classList.add('visible-section');
    el.querySelectorAll('.gb-popup-scale-blur').forEach(el=>{
      el.style.animation='none';
      el.offsetHeight;
      el.style.animation='';
    });
  });
}

// ── Init dashboard ─────────────────────────────────────────
async function initDashboard(){
  document.getElementById('empNameBar').textContent=`${session.name} (${session.empId})`;
  const s=await api('GET','/api/settings');
  if(s&&!s.error)settings=s;
  document.getElementById('targetHours').textContent=settings.workHours+'h';
  startClock();
  await loadHistoryAndState();
// Leave feature removed
  // show logout on desktop
  document.getElementById('logoutBtn').style.display='';
}

// ── Clock ──────────────────────────────────────────────────
function startClock(){
  clearInterval(clockInterval);
  function tick(){
    const now=new Date();
    document.getElementById('liveClock').textContent=now.toLocaleTimeString('en-US',{hour12:true});
    document.getElementById('liveDate').textContent=now.toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    checkNotice(now);
  }
  tick();clockInterval=setInterval(tick,1000);
}
function checkNotice(now){
  const box=document.getElementById('empNotice');
  const [sh,sm]=settings.startTime.split(':').map(Number);
  const [eh,em]=settings.endTime.split(':').map(Number);
  const startMin=sh*60+sm,endMin=eh*60+em,nowMin=now.getHours()*60+now.getMinutes();
  if(nowMin<startMin){box.innerHTML=`<div class="emp-notice info">🕘 Opens at ${to12hr(settings.startTime)}</div>`;return;}
  if(nowMin>=startMin&&nowMin<=startMin+settings.graceMins&&sessionCount===0&&!checkInTs){box.innerHTML=`<div class="emp-notice default">⚡ On time! Clock in now.</div>`;return;}
  if(checkInTs){box.innerHTML=`<div class="emp-notice default">✅ Session ${sessionCount} in progress</div>`;return;}
  if(!checkInTs){
    if(sessionCount===0)box.innerHTML=nowMin<=endMin?`<div class="emp-notice warn">⚠ Not clocked in yet!</div>`:`<div class="emp-notice warn">⚠ Office hours ended.</div>`;
    else if(sessionCount===1){const s2=settings.session2Start||'13:30';box.innerHTML=`<div class="emp-notice info">⏸ On break — clock in for Session 2 at ${to12hr(s2)}</div>`;}
    else box.innerHTML=`<div class="emp-notice success">✅ Work complete!</div>`;
    return;
  }
}

// ── Clock In ────────────────────────────────────────────────
async function checkIn(){
  if(sessionCount>=2){showToast('⚠️','Already completed 2 sessions');return;}
  if(checkInTs){showToast('⚠️','Already clocked in!');return;}
  const now=new Date(),checkInStr=now.toTimeString().slice(0,5);
  const [sh,sm]=settings.startTime.split(':').map(Number);
  const nowMin=now.getHours()*60+now.getMinutes();
  let status='present';
  if(sessionCount===0){
    status=nowMin<=sh*60+sm+(settings.graceMins||15)?'present':'late';
  } else {
    // Session 2 late check
    const s2Start=settings.session2Start||'13:30';
    const [s2h,s2m]=s2Start.split(':').map(Number);
    status=nowMin<=(s2h*60+s2m+(settings.graceMins||15))?'present':'late';
  }
  const res=await api('POST','/api/checkin',{empId:session.empId,name:session.name,checkIn:checkInStr,status});
  if(res.error){showToast('❌',res.error);return;}
  checkInTs=now;sessionCount++;
  document.getElementById('checkInBtn').disabled=true;
  document.getElementById('checkOutBtn').disabled=false;
  document.getElementById('sessionLabel').textContent=`${sessionCount} of 2`;
  updateSessionChips(res.rec);startTimer();
  // Show admin call notification if late (for either session)
  const adminPhone = res.adminPhone || settings.adminPhone || '';
  const noticeEl = document.getElementById('adminCallNotice');
  if(res.late && adminPhone){
    noticeEl.innerHTML=`<div class="emp-notice warn">⚠ Late clock-in! Please notify admin: <a href="tel:${adminPhone}" style="color:var(--accent);font-weight:700;">📞 Call Admin</a></div>`;
  } else if(res.late){
    noticeEl.innerHTML='<div class="emp-notice warn">⚠ Late clock-in! Please inform your admin.</div>';
  } else {
    noticeEl.innerHTML='';
  }
  if(res.lateNote)showToast('⚠️',`${res.lateNote} — Please contact admin`);
  else if(sessionCount===2)showToast('✅',`Session 2 started at ${to12hr(checkInStr)}`);
  else showToast('✅',`Clocked in at ${to12hr(checkInStr)}${status==='late'?' (Late)':''}`);
}

// ── Clock Out ───────────────────────────────────────────────
async function checkOut(){
  if(!checkInTs){showToast('⚠️','Not clocked in!');return;}
  const now=new Date(),checkOutStr=now.toTimeString().slice(0,5);
  const res=await api('POST','/api/checkout',{empId:session.empId,name:session.name,checkOut:checkOutStr});
  if(res.error){showToast('❌',res.error);return;}
  const sessionSecs=Math.floor((now-checkInTs)/1000);
  totalWorkedSecs+=sessionSecs;
  clearInterval(timerInterval);timerInterval=null;checkInTs=null;
  document.getElementById('checkInBtn').disabled=false;
  document.getElementById('checkOutBtn').disabled=true;
  document.getElementById('totalToday').textContent=res.totalWork||fmt(totalWorkedSecs);
  updateSessionChips(res);
  const TARGET=settings.workHours*3600;
  if(sessionCount<2){
    setPill('break');
    showToast('⏸',totalWorkedSecs>=TARGET?`Full Day! Total: ${res.totalWork}`:'Break started — Clock in for Session 2');
  }else{
    setPill('out');
    showToast(totalWorkedSecs<TARGET?'⚠️':'✅',totalWorkedSecs<TARGET?`Half Day (${fmt(totalWorkedSecs)} worked)`:`Full Day! Total: ${res.totalWork||fmt(totalWorkedSecs)}`);
  }
  await loadHistoryAndState();
}

// ── Timer ───────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  const TARGET=settings.workHours*3600;
  timerInterval=setInterval(()=>{
    if(!checkInTs)return;
    const sessionSecs=Math.floor((new Date()-checkInTs)/1000);
    const totalSecs=totalWorkedSecs+sessionSecs;
    const pct=Math.min(totalSecs/TARGET,1),rem=Math.max(TARGET-totalSecs,0);
    document.getElementById('timerElapsed').textContent=fmt(sessionSecs);
    document.getElementById('timerPct').textContent=Math.floor(pct*100)+'%';
    document.getElementById('remainingTime').textContent=fmt(rem);
    document.getElementById('totalToday').textContent=fmt(totalSecs);
    document.getElementById('timerRing').style.strokeDashoffset=CIRC*(1-pct);
    if(totalSecs>=TARGET)document.getElementById('timerRing').style.stroke='var(--accentL)';
  },1000);
}

function updateSessionChips(rec){
  const chips=document.getElementById('sessionChips');
  if(!rec||!rec.sessions){chips.innerHTML='';return;}
  chips.innerHTML=rec.sessions.map((s,i)=>`<span class="session-chip ${!s.out?'active':''}">S${i+1}: ${to12hr(s.in)}→${s.out?to12hr(s.out):'now'}</span>`).join('');
}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function setPill(state){
  const p=document.getElementById('statusPill');
  const map={present:['pill-in','● IN'],late:['pill-late','● LATE'],break:['pill-break','⏸ BREAK'],out:['pill-out','● OFF']};
  const [cls,txt]=map[state]||map.out;
  p.className='status-pill '+cls;p.textContent=txt;
}

// ── History & state ─────────────────────────────────────────
async function loadHistoryAndState(){
  const res=await api('GET',`/api/attendance/${session.empId}`);
  const rows=Array.isArray(res)?res:[];
  const el=document.getElementById('attHistory');
  if(!rows.length){el.innerHTML='<p style="color:var(--muted);font-size:13px;">No records yet.</p>';}
  else{
    const sorted=[...rows].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
    el.innerHTML=sorted.map(r=>{
      const st=r.sessions?r.sessions.map(s=>`${to12hr(s.in)}→${s.out?to12hr(s.out):'--'}`).join(' | '):`${to12hr(r.checkIn||'—')}→${to12hr(r.checkOut||'—')}`;
      const tot=r.totalWork||r.duration||'—';
      return`<div class="att-row"><span class="att-date">${r.date}</span><span class="att-sessions">${st}</span><span style="font-family:'DM Mono',monospace;font-size:11px;">${tot}</span><span class="att-badge badge-${r.status||'absent'}">${r.status||'absent'}</span></div>`;
    }).join('');
  }
  const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  const today=d.toISOString().split('T')[0];
  const tr=rows.find(r=>r.date===today);
  if(tr){
    sessionCount=tr.sessions?tr.sessions.length:0;
    const open=tr.sessions?tr.sessions.find(s=>s.in&&!s.out):null;
    totalWorkedSecs=(tr.sessions||[]).reduce((acc,s)=>{
      if(s.in&&s.out){const[h1,m1]=s.in.split(':').map(Number),[h2,m2]=s.out.split(':').map(Number);return acc+((h2*3600+m2*60)-(h1*3600+m1*60));}
      return acc;
    },0);
    if(open){
      const[h,m]=open.in.split(':').map(Number),now=new Date();
      checkInTs=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m);
      document.getElementById('checkInBtn').disabled=true;
      document.getElementById('checkOutBtn').disabled=false;
      setPill(sessionCount>=2?'late':'present');startTimer();
    }else if(sessionCount===1)setPill('break');
    document.getElementById('sessionLabel').textContent=`${Math.max(sessionCount,1)} of 2`;
    document.getElementById('totalToday').textContent=tr.totalWork||fmt(totalWorkedSecs);
    updateSessionChips(tr);
  }
}

// Leave feature removed
async function submitLeave(){return; // Leave feature removed
  if(false){
  const from=document.getElementById('hFrom').value,to=document.getElementById('hTo').value;
  const type=document.getElementById('hType').value,reason=document.getElementById('hReason').value.trim();
  if(!from||!to||!reason){showToast('⚠️','Fill all fields.');return;}
  const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  const res=await api('POST','/api/leaves',{id:'REQ'+Date.now(),empId:session.empId,name:session.name,from,to,type,reason,status:'pending',applied:d.toISOString().split('T')[0]});
  if(res.error){showToast('❌','Server error.');return;}
  document.getElementById('hFrom').value='';document.getElementById('hTo').value='';document.getElementById('hReason').value='';
  loadLeaves();showToast('✈️','Leave submitted! Awaiting approval.');
  // switch to my requests on mobile
  if(window.innerWidth<768)switchTab('leave');
}

// ── Toast ────────────────────────────────────────────────────
let toastTimer;
function showToast(icon,msg){
  clearTimeout(toastTimer);
  document.getElementById('toastIcon').textContent=icon;
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}
</script>
</body>
